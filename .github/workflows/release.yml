name: syn-probe

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: make all

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: syn-probe
          name: syn-probe
          body: Half-open TCP SYN port prober. See [README](README.md) for details.
          make_latest: false
          files: |
            syn-probe-linux-amd64
            syn-probe-linux-arm64
